<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock — Nebbuler</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .time {
      font-family: var(--font-display);
      font-size: clamp(48px, 14vw, 80px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--fg);
      font-optical-sizing: auto;
    }
    .date {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--secondary);
      margin-top: 8px;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="nebbuler-widget clock">
    <div class="time" id="time">00:00</div>
    <div class="date" id="date">—</div>
  </div>
  <script>
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function update() {
      const now = new Date();
      const use24h = !navigator.language.startsWith('en-US');
      let hours = now.getHours();
      let suffix = '';
      if (!use24h) {
        suffix = hours >= 12 ? ' PM' : ' AM';
        hours = hours % 12 || 12;
      }
      const mins = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${hours}:${mins}${suffix}`;
      document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    }

    update();
    // align to next full minute
    const now = new Date();
    const msToNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
    setTimeout(() => { update(); setInterval(update, 60000); }, msToNextMinute);
  </script>
</body>
</html>
