<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <!-- Gradient orbs -->
  <circle cx="200" cy="150" r="300" fill="#2383E2" fill-opacity="0.08"/>
  <circle cx="1000" cy="500" r="250" fill="#9065B0" fill-opacity="0.06"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#37352F" stroke-width="0.3" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#2383E2"/>
  <path d="M96 96h10l20 30V96h10v42h-10L106 108V138H96V96z" fill="white"/>
  <!-- Title -->
  <text x="172" y="126" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#37352F" letter-spacing="-1">Notion</text>
  <text x="315" y="126" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#2383E2" letter-spacing="-1">LATAM</text>
  <!-- Headline -->
  <text x="80" y="260" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#37352F" letter-spacing="-2">Templates, Cursos y</text>
  <text x="80" y="340" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#37352F" letter-spacing="-2">Consultoría para LATAM</text>
  <!-- Description -->
  <text x="80" y="420" font-family="Inter, sans-serif" font-size="28" fill="#787774" letter-spacing="-0.5">El ecosistema completo de Notion para empresas latinoamericanas</text>
  <!-- Stats -->
  <rect x="80" y="490" width="200" height="80" rx="12" fill="#F7F6F3"/>
  <text x="180" y="535" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#2383E2" text-anchor="middle">500+</text>
  <text x="180" y="558" font-family="Inter, sans-serif" font-size="14" fill="#787774" text-anchor="middle">Empresas</text>
  <rect x="300" y="490" width="200" height="80" rx="12" fill="#F7F6F3"/>
  <text x="400" y="535" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#2383E2" text-anchor="middle">15+</text>
  <text x="400" y="558" font-family="Inter, sans-serif" font-size="14" fill="#787774" text-anchor="middle">Países LATAM</text>
  <rect x="520" y="490" width="200" height="80" rx="12" fill="#F7F6F3"/>
  <text x="620" y="535" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#2383E2" text-anchor="middle">4.9/5</text>
  <text x="620" y="558" font-family="Inter, sans-serif" font-size="14" fill="#787774" text-anchor="middle">Rating</text>
</svg>
